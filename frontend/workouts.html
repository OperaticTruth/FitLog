<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FitLog — Workouts</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #22222f;
  --border: #2a2a3a;
  --accent-a: #c8f542;
  --accent-b: #f542c8;
  --accent-c: #42c8f5;
  --text: #e8e8f0;
  --text-dim: #7a7a9a;
  --text-faint: #3a3a55;
  --red: #ff4466;
  --green: #42f59a;
  --orange: #f5a442;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* ── LOGIN ── */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 36px; width: 100%; max-width: 380px; }
.login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 38px; letter-spacing: 4px; color: var(--accent-a); text-align: center; }
.login-logo span { color: var(--accent-b); }
.login-sub { text-align: center; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 28px; margin-top: 4px; }
.lf { margin-bottom: 14px; }
.lf label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; }
.lf input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; padding: 11px 14px; border-radius: 10px; outline: none; letter-spacing: 3px; }
.lf input[type=text] { letter-spacing: 1px; }
.lf input:focus { border-color: var(--accent-a); }
.login-err { background: rgba(255,68,102,0.1); border: 1px solid rgba(255,68,102,0.3); border-radius: 8px; padding: 9px 14px; font-size: 13px; color: var(--red); margin-bottom: 12px; display: none; }

/* ── TOPBAR ── */
.topbar { position: sticky; top: 0; z-index: 200; background: rgba(10,10,15,0.95); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--accent-a); }
.logo span { color: var(--accent-b); }
.logo small { font-size: 11px; letter-spacing: 2px; color: var(--text-dim); margin-left: 8px; font-family: 'DM Sans', sans-serif; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.profile-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; cursor: pointer; transition: all 0.2s; }
.profile-btn.active { background: var(--accent-a); border-color: var(--accent-a); color: #0a0a0f; }
.profile-btn.partner { border-style: dashed; }
.profile-btn.partner.active { background: var(--accent-b); border-color: var(--accent-b); color: #0a0a0f; }
.icon-btn { background: none; border: 1px solid var(--border); color: var(--text-dim); font-size: 16px; width: 34px; height: 34px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--accent-a); color: var(--accent-a); }

/* ── NAV TABS ── */
.nav { display: flex; gap: 4px; padding: 10px 16px; border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { background: none; border: none; color: var(--text-dim); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.nav-btn:hover { background: var(--surface2); color: var(--text); }
.nav-btn.active { background: var(--surface2); color: var(--accent-a); }
.back-link { display: flex; align-items: center; gap: 6px; color: var(--text-dim); font-size: 13px; text-decoration: none; padding: 6px 10px; border-radius: 8px; cursor: pointer; border: none; background: none; }
.back-link:hover { color: var(--text); background: var(--surface2); }

/* ── MAIN ── */
.main { padding: 16px; max-width: 860px; margin: 0 auto; }
.page { display: none; }
.page.active { display: block; }

/* ── CARDS ── */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
.card-title { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 14px; }
.card-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-row .card-title { margin-bottom: 0; }

/* ── BUTTONS ── */
.btn { background: var(--accent-a); color: #0a0a0f; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 2px; padding: 11px 24px; border-radius: 8px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; display: inline-flex; align-items: center; gap: 7px; }
.btn:hover { opacity: 0.88; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.btn.sm { font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; padding: 7px 14px; }
.btn.ghost { background: var(--surface3); color: var(--text); border: 1px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0; }
.btn.danger { background: rgba(255,68,102,0.15); color: var(--red); border: 1px solid rgba(255,68,102,0.3); font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 0; padding: 6px 12px; }
.btn.ai { background: linear-gradient(135deg, #1a2e3a, #0f1f2a); color: var(--accent-c); border: 1px solid rgba(66,200,245,0.3); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.5px; }
.btn.ai:hover { border-color: var(--accent-c); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* ── FORMS ── */
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); }
.fg input, .fg select, .fg textarea { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 9px 12px; border-radius: 8px; outline: none; width: 100%; transition: border-color 0.2s; }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color: var(--accent-a); }
.fg textarea { font-family: 'DM Sans', sans-serif; resize: vertical; min-height: 70px; }
.form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 14px; }

/* ── TODAY CARD ── */
.today-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.today-day { font-family: 'Bebas Neue', sans-serif; font-size: 52px; line-height: 1; color: var(--accent-a); }
.today-info { flex: 1; }
.today-date { font-size: 12px; color: var(--text-dim); letter-spacing: 1px; text-transform: uppercase; }
.today-muscle { font-size: 22px; font-weight: 600; color: var(--text); margin-top: 2px; }
.today-style { font-size: 12px; color: var(--accent-b); margin-top: 2px; font-weight: 600; letter-spacing: 0.5px; }
.rest-day { text-align: center; padding: 40px 20px; }
.rest-day .icon { font-size: 48px; margin-bottom: 10px; }
.rest-day h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--text-dim); }
.rest-day p { font-size: 14px; color: var(--text-faint); margin-top: 6px; }

/* ── EXERCISE CARD in workout ── */
.exercise-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 10px; position: relative; }
.exercise-block.superset { border-left: 3px solid var(--accent-b); }
.ex-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.ex-name { font-size: 16px; font-weight: 700; color: var(--text); }
.ex-muscle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.ex-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.badge { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 20px; }
.badge.superset { background: rgba(245,66,200,0.15); color: var(--accent-b); }
.badge.hiit { background: rgba(245,164,66,0.15); color: var(--orange); }
.badge.strength { background: rgba(200,245,66,0.15); color: var(--accent-a); }
.badge.pr { background: rgba(66,245,154,0.2); color: var(--green); animation: glow 1.5s ease-in-out infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 4px rgba(66,245,154,0.3); } to { box-shadow: 0 0 12px rgba(66,245,154,0.6); } }

.last-performance { background: rgba(200,245,66,0.06); border: 1px solid rgba(200,245,66,0.15); border-radius: 8px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: var(--text-dim); }
.last-performance strong { color: var(--accent-a); }

.sets-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
.sets-table th { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); padding: 4px 6px; text-align: center; }
.sets-table td { padding: 5px 4px; text-align: center; }
.sets-table td input { background: var(--surface3); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; padding: 6px 4px; border-radius: 6px; text-align: center; width: 64px; outline: none; }
.sets-table td input:focus { border-color: var(--accent-a); }
.sets-table td input.pr-input { border-color: var(--green); }
.set-num { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); font-weight: 500; }
.check-set { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.2s; margin: auto; }
.check-set.done { background: var(--accent-a); border-color: var(--accent-a); color: #0a0a0f; }

.superset-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-b); margin-bottom: 6px; }

/* ── AI LOADING ── */
.ai-loading { background: linear-gradient(135deg, rgba(66,200,245,0.08), rgba(66,200,245,0.03)); border: 1px solid rgba(66,200,245,0.2); border-radius: 12px; padding: 28px; text-align: center; }
.ai-spinner { width: 36px; height: 36px; border: 3px solid rgba(66,200,245,0.2); border-top-color: var(--accent-c); border-radius: 50%; animation: spin 0.9s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.ai-loading p { color: var(--text-dim); font-size: 13px; }
.ai-loading strong { color: var(--accent-c); }

/* ── HISTORY LIST ── */
.history-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; cursor: pointer; transition: border-color 0.15s; }
.history-item:hover { border-color: var(--accent-a); }
.history-item-header { display: flex; align-items: center; justify-content: space-between; }
.history-date { font-size: 13px; font-weight: 600; color: var(--text); }
.history-muscle { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.history-stats { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--accent-a); }
.history-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.history-detail.open { display: block; }
.history-ex { font-size: 13px; margin-bottom: 6px; }
.history-ex strong { color: var(--text); }
.history-ex span { color: var(--text-dim); font-size: 12px; }

/* ── PR TABLE ── */
.pr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.pr-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.pr-ex { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.pr-val { font-family: 'DM Mono', monospace; font-size: 18px; color: var(--green); }
.pr-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

/* ── SCHEDULE ── */
.schedule-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 16px; }
.sched-day { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 6px; text-align: center; }
.sched-day.gym { border-color: rgba(200,245,66,0.3); }
.sched-day.rest { opacity: 0.5; }
.sched-day-name { font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 5px; }
.sched-muscle { font-size: 11px; color: var(--text); font-weight: 500; }
.sched-style { font-size: 9px; color: var(--accent-b); margin-top: 2px; }

/* ── LIBRARY ── */
.library-search { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 10px 14px; border-radius: 10px; outline: none; margin-bottom: 12px; }
.library-search:focus { border-color: var(--accent-a); }
.lib-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.lib-filter { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; cursor: pointer; }
.lib-filter.active { background: var(--accent-a); border-color: var(--accent-a); color: #0a0a0f; }
.lib-list { max-height: 400px; overflow-y: auto; }
.lib-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: border-color 0.15s; }
.lib-item:hover { border-color: var(--accent-a); }
.lib-item-name { font-size: 14px; font-weight: 500; }
.lib-item-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.lib-item-add { font-size: 18px; color: var(--text-faint); }
.lib-item:hover .lib-item-add { color: var(--accent-a); }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 500; display: none; align-items: flex-end; justify-content: center; padding: 16px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px 16px 16px 16px; width: 100%; max-width: 560px; max-height: 85vh; overflow-y: auto; padding: 20px; }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; }

/* ── SETTINGS ── */
.set-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.set-row:last-child { border-bottom: none; }
.set-row label { font-size: 14px; font-weight: 500; flex: 1; }
.set-row small { display: block; font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.set-row select, .set-row input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; border-radius: 8px; outline: none; max-width: 160px; }

/* ── MISC ── */
.empty { text-align: center; padding: 36px 20px; color: var(--text-dim); }
.empty .icon { font-size: 36px; margin-bottom: 10px; }
.toast { position: fixed; bottom: 24px; right: 20px; background: var(--accent-a); color: #0a0a0f; font-weight: 700; font-size: 13px; padding: 11px 18px; border-radius: 10px; transform: translateY(70px); opacity: 0; transition: all 0.28s; z-index: 999; pointer-events: none; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.err { background: var(--red); color: #fff; }
.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 500px) {
  .schedule-grid { grid-template-columns: repeat(4, 1fr); }
  .pr-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">FIT<span>LOG</span></div>
    <div class="login-sub">Workouts</div>
    <div class="lf"><label>Name</label><input type="text" id="ln" placeholder="Jake or Lindsay" autocomplete="off"></div>
    <div class="lf"><label>PIN</label><input type="password" id="lp" placeholder="••••" maxlength="4" inputmode="numeric"></div>
    <div class="login-err" id="lerr"></div>
    <button class="btn" style="width:100%;justify-content:center" onclick="doLogin()">ENTER</button>
    <p style="text-align:center;font-size:12px;color:var(--text-faint);margin-top:14px">Use the same name & PIN as the main FitLog app</p>
  </div>
</div>

<!-- APP -->
<div id="app-screen" style="display:none">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="logo">FIT<span>LOG</span><small>WORKOUTS</small></div>
    </div>
    <div class="topbar-right">
      <div style="display:flex;gap:6px">
        <button class="profile-btn active" id="myBtn" onclick="switchView('me')">👤 —</button>
        <button class="profile-btn partner" id="ptBtn" onclick="switchView('partner')">💜 —</button>
      </div>
      <button class="icon-btn" onclick="showPage('settings')" title="Settings">⚙️</button>
      <button class="icon-btn" onclick="doLogout()" title="Sign out" style="font-size:13px">↩</button>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="showPage('today')">Today</button>
    <button class="nav-btn" onclick="showPage('history')">History</button>
    <button class="nav-btn" onclick="showPage('prs')">PRs</button>
    <button class="nav-btn" onclick="showPage('library')">Exercise Library</button>
    <button class="nav-btn" onclick="showPage('settings')">Settings</button>
  </div>

  <div class="main">

    <!-- TODAY -->
    <div class="page active" id="page-today">
      <div id="today-content"></div>
    </div>

    <!-- HISTORY -->
    <div class="page" id="page-history">
      <div class="card">
        <div class="card-title">📋 Workout History</div>
        <div id="history-list"><div class="empty"><div class="icon">📋</div><p>No workouts logged yet</p></div></div>
      </div>
    </div>

    <!-- PRs -->
    <div class="page" id="page-prs">
      <div class="card">
        <div class="card-title">🏆 Personal Records</div>
        <div id="pr-grid" class="pr-grid"></div>
      </div>
    </div>

    <!-- LIBRARY -->
    <div class="page" id="page-library">
      <div class="card">
        <div class="card-row">
          <div class="card-title">📚 Exercise Library</div>
          <button class="btn sm" onclick="openAddExerciseModal()">+ Add</button>
        </div>
        <input class="library-search" placeholder="Search exercises..." oninput="filterLibrary(this.value)" id="lib-search">
        <div class="lib-filters" id="lib-filters"></div>
        <div class="lib-list" id="lib-list"></div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="page" id="page-settings">
      <div class="card">
        <div class="card-title">📅 Workout Schedule</div>
        <p style="font-size:13px;color:var(--text-dim);margin-bottom:16px">Set which days you train and what muscle group each day targets.</p>
        <div id="schedule-editor"></div>
        <button class="btn" onclick="saveSchedule()">SAVE SCHEDULE</button>
      </div>
      <div class="card">
        <div class="card-title">🎯 Training Profile</div>
        <div id="training-profile-editor"></div>
        <button class="btn" style="margin-top:14px" onclick="saveProfile()">SAVE PROFILE</button>
      </div>
    </div>

  </div>
</div>

<!-- LIBRARY MODAL (swap exercise) -->
<div class="modal-overlay" id="swap-modal">
  <div class="modal">
    <div class="modal-title">
      Swap Exercise
      <button class="modal-close" onclick="closeModal('swap-modal')">✕</button>
    </div>
    <input class="library-search" placeholder="Search..." oninput="filterSwapLibrary(this.value)" id="swap-search">
    <div class="lib-filters" id="swap-filters"></div>
    <div class="lib-list" id="swap-list"></div>
  </div>
</div>

<!-- ADD EXERCISE MODAL -->
<div class="modal-overlay" id="add-ex-modal">
  <div class="modal">
    <div class="modal-title">Add Exercise<button class="modal-close" onclick="closeModal('add-ex-modal')">✕</button></div>
    <div class="form-grid">
      <div class="fg" style="grid-column:1/-1"><label>Exercise Name</label><input type="text" id="new-ex-name" placeholder="e.g. Bulgarian Split Squat"></div>
      <div class="fg"><label>Muscle Group</label>
        <select id="new-ex-muscle">
          <option>Chest</option><option>Back</option><option>Shoulders</option>
          <option>Biceps</option><option>Triceps</option><option>Quads</option>
          <option>Hamstrings</option><option>Glutes</option><option>Calves</option>

function toast(msg, err=false) {

function todayName() { return DAYS_OF_WEEK[new Date().getDay()]; }
function todayStr()  { return new Date().toISOString().split('T')[0]; }
function fmtDate(s)  { return new Date(s+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }

async function doLogin() {
  const name = document.getElementById('ln').value.trim();
  const pin  = document.getElementById('lp').value.trim();
  const err  = document.getElementById('lerr');
  err.style.display = 'none';
  if (!name || pin.length < 4) { err.textContent='Enter name and 4-digit PIN'; err.style.display='block'; return; }
  try {
    const res = await fetch(API+'/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name,pin}) });
    if (!res.ok) throw new Error((await res.json()).detail || 'Invalid credentials');
    session = await res.json();
    launchApp();
  } catch(e) { err.textContent = e.message; err.style.display='block'; }
}

function launchApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('myBtn').textContent = '👤 ' + session.name.split(' ')[0];
  if (session.partner) {
    document.getElementById('ptBtn').textContent = '💜 ' + session.partner.name.split(' ')[0];
  } else {
    document.getElementById('ptBtn').style.display = 'none';
  }
  renderToday();
  renderLibrary();
  renderSettings();
}

function doLogout() {
  session = null; todayWorkout = null;
  document.getElementById('app-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('lp').value='';
}

function switchView(who) {
  if (who==='partner' && !session?.partner) { toast('No partner linked', true); return; }
  viewingPartner = who==='partner';
  document.getElementById('myBtn').classList.toggle('active', !viewingPartner);
  document.getElementById('ptBtn').classList.toggle('active', viewingPartner);
  todayWorkout = null;
  renderToday();
  renderSettings();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const navBtns = document.querySelectorAll('.nav-btn');
  const pages = ['today','history','prs','library','settings'];
  const idx = pages.indexOf(id);
  if (idx>=0 && navBtns[idx]) navBtns[idx].classList.add('active');
  if (id==='today')   renderToday();
  if (id==='history') renderHistory();
  if (id==='prs')     renderPRs();
  if (id==='library') renderLibrary();
  if (id==='settings') renderSettings();
}

async function renderToday() {
  const el = document.getElementById('today-content');
  const day = todayName();
  const sched = getSchedule(viewKey());
  const dayInfo = sched[day] || { gym: false, muscle: 'Rest', style: '' };
  const dayAbbr = day.substring(0,3).toUpperCase();
  const profile = getProfile(viewKey());

  if (!dayInfo.gym) {
    el.innerHTML = `
      <div class="card">
        <div class="today-header">
          <div class="today-day">${dayAbbr}</div>
          <div class="today-info">
            <div class="today-date">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
            <div class="today-muscle">${dayInfo.muscle}</div>
          </div>
        </div>
        <div class="rest-day">
          <div class="icon">${dayInfo.muscle.includes('Pole')?'🎪':dayInfo.muscle.includes('Cardio')?'🏃':dayInfo.muscle.includes('Rest')?'😴':'💆'}</div>
          <h2>${dayInfo.muscle.toUpperCase()}</h2>
          <p>${dayInfo.muscle.includes('Rest') ? 'Recovery is part of the program. See you tomorrow.' : 'Get after it!'}</p>
        </div>
      </div>`;
    return;
  }

  // Check if already logged today
  const history = getHistory(viewKey());
  const alreadyLogged = history.find(h=>h.date===todayStr());

  el.innerHTML = `
    <div class="card">
      <div class="today-header">
        <div class="today-day">${dayAbbr}</div>
        <div class="today-info">
          <div class="today-date">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>
          <div class="today-muscle">${dayInfo.muscle}</div>
          <div class="today-style">${dayInfo.style}</div>
        </div>
      </div>
      ${alreadyLogged ? `<div style="background:rgba(200,245,66,0.08);border:1px solid rgba(200,245,66,0.2);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--accent-a)">✓ Workout already logged for today! You can still generate a new one or log again.</div>` : ''}
      <div class="btn-row">
        <button class="btn ai" id="gen-btn" onclick="generateWorkout()">✦ Generate Workout</button>
        ${todayWorkout ? `<button class="btn ghost" onclick="saveWorkout()">💾 Save Workout</button>` : ''}
      </div>
    </div>
    <div id="workout-display"></div>`;

  if (todayWorkout) renderWorkoutDisplay();
}

async function generateWorkout() {
  const btn = document.getElementById('gen-btn');
  const display = document.getElementById('workout-display');
  btn.disabled = true;
  btn.textContent = '✦ Generating...';

  const day = todayName();
  const sched = getSchedule(viewKey());
  const dayInfo = sched[day];
  const profile = getProfile(viewKey());
  const history = getHistory(viewKey());
  const prs = getPRs(viewKey());
  const isPartner = viewingPartner;

  // Build recent history context
  const recentWorkouts = history.slice(-5).map(h =>
    `${h.date} (${h.muscleGroup}): ${h.exercises.map(e=>`${e.name} — ${e.sets.map(s=>`${s.reps}x${s.weight}lbs`).join(', ')}`).join(' | ')}`
  ).join('\n');

  // Build PR context
  const prContext = Object.entries(prs).map(([ex,pr])=>`${ex}: ${pr.weight}lbs x ${pr.reps}`).join(', ');

  const prompt = `You are an expert personal trainer creating a workout for ${viewName()}.

PROFILE:
- Goal: ${profile.goal}
- Training style: ${profile.style}
- Experience: ${profile.experience}
- Today: ${day} — ${dayInfo.muscle} day
- Style for today: ${dayInfo.style}

RECENT WORKOUT HISTORY:
${recentWorkouts || 'No recent history yet.'}

PERSONAL RECORDS:
${prContext || 'No PRs recorded yet.'}

IMPORTANT RULES:
${isPartner ? `
- Lindsay wants to LOSE 40 LBS in 6 months — keep intensity HIGH
- Use supersets wherever possible to maximize calorie burn
- Keep rest periods SHORT (30-60 seconds between sets)
- Include HIIT elements — metabolic finishers are great
- Mix compound and isolation movements
- 4-5 exercises, some paired as supersets
` : `
- Jake wants body recomp — lose fat, build muscle, strength focus
- Progressive overload is key — suggest weights based on PR history
- Moderate rest (60-90 seconds)
- 5-6 exercises, mostly compound movements with isolation finish
- Strength rep ranges: 3-5 sets of 5-8 reps for compounds
`}

EXERCISE LIBRARY (use these names exactly, or invent if needed):
${getLibrary().map(e=>e.name).join(', ')}

OUTPUT FORMAT — respond with ONLY valid JSON, no markdown, no explanation:
{
  "title": "Workout title",
  "notes": "One sentence tip or motivation for today",
  "exercises": [
    {
      "name": "Exercise Name",
      "muscle": "Muscle Group",
      "sets": 3,
      "reps": "8-10",
      "weight_suggestion": "Start at 95 lbs (based on your PR)",
      "notes": "Brief cue",
      "superset_with": null
    }
  ]
}

For supersets, set superset_with to the name of the exercise it pairs with (both exercises should reference each other).
Generate the workout now.`;

  display.innerHTML = `<div class="ai-loading"><div class="ai-spinner"></div><p><strong>AI is building your ${dayInfo.muscle} workout...</strong><br>Analyzing your history and goals</p></div>`;

  try {
    const res = await fetch(ANTHROPIC_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    let text = data.content.map(c=>c.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const workout = JSON.parse(text);
    workout.day = todayName();
    workout.muscleGroup = dayInfo.muscle;
    workout.style = dayInfo.style;
    // Initialize logging state
    workout.exercises = workout.exercises.map((ex, i) => ({
      ...ex,
      id: i,
      loggedSets: Array(ex.sets).fill(null).map(() => ({ reps: '', weight: '', done: false }))
    }));
    todayWorkout = workout;
    renderWorkoutDisplay();
    // Show save button
    document.querySelector('.btn-row').innerHTML = `
      <button class="btn ai" id="gen-btn" onclick="generateWorkout()">✦ Regenerate</button>
      <button class="btn ghost" onclick="saveWorkout()">💾 Save Workout</button>`;
  } catch(e) {
    display.innerHTML = `<div class="card"><p style="color:var(--red)">Failed to generate workout: ${e.message}. Make sure the backend API URL is set.</p></div>`;
  }
  btn.disabled = false;
}

function renderWorkoutDisplay() {
  const display = document.getElementById('workout-display');
  if (!todayWorkout) return;
  const w = todayWorkout;
  const history = getHistory(viewKey());
  const prs = getPRs(viewKey());

  // Group supersets
  const rendered = new Set();
  let html = '';

  // Workout title card
  html += `<div class="card" style="background:linear-gradient(135deg,#111118,#0f1a20);border-color:rgba(66,200,245,0.2)">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent-c);margin-bottom:6px">${w.title}</div>
    <div style="font-size:13px;color:var(--text-dim)">${w.notes}</div>
  </div>`;

  w.exercises.forEach((ex, idx) => {
    if (rendered.has(idx)) return;
    rendered.add(idx);

    const isSuperset = !!ex.superset_with;
    const superPartnerIdx = isSuperset ? w.exercises.findIndex(e=>e.name===ex.superset_with && e.id!==ex.id) : -1;
    if (superPartnerIdx>=0) rendered.add(superPartnerIdx);
    const superPartner = superPartnerIdx>=0 ? w.exercises[superPartnerIdx] : null;

    // Find last performance
    const lastPerf = findLastPerformance(ex.name, history);
    const prVal = prs[ex.name];

    const exHTML = (exercise, exIdx) => {
      const lp = findLastPerformance(exercise.name, history);
      const pr = prs[exercise.name];
      return `
        <div style="${isSuperset&&exIdx>0?'margin-top:12px;padding-top:12px;border-top:1px solid var(--border)':''}">
          <div class="ex-header">
            <div>
              <div class="ex-name">${exercise.name}</div>
              <div class="ex-muscle">${exercise.muscle}</div>
              <div class="ex-badges">
                ${isSuperset?'<span class="badge superset">SUPERSET</span>':''}
                ${w.style?.includes('HIIT')?'<span class="badge hiit">HIIT</span>':'<span class="badge strength">STRENGTH</span>'}
              </div>
            </div>
            <button class="btn danger" onclick="openSwapModal(${exIdx})">⇄ Swap</button>
          </div>
          ${lp ? `<div class="last-performance">📊 Last time: <strong>${lp.sets.map(s=>`${s.reps}×${s.weight}lbs`).join(', ')}</strong> on ${fmtDate(lp.date)}</div>` : ''}
          ${exercise.weight_suggestion ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px;font-style:italic">💡 ${exercise.weight_suggestion}</div>` : ''}
          ${exercise.notes ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:10px">📌 ${exercise.notes}</div>` : ''}
          <table class="sets-table">
            <thead><tr><th>SET</th><th>REPS</th><th>WEIGHT (lbs)</th><th>✓</th></tr></thead>
            <tbody>
              ${exercise.loggedSets.map((s,si)=>`
                <tr>
                  <td><span class="set-num">${si+1}</span></td>
                  <td><input type="number" placeholder="${exercise.reps}" value="${s.reps}" id="reps-${exIdx}-${si}" oninput="updateSet(${exIdx},${si},'reps',this.value);checkPR(${exIdx},${si})"></td>
                  <td><input type="number" placeholder="lbs" value="${s.weight}" id="wt-${exIdx}-${si}" oninput="updateSet(${exIdx},${si},'weight',this.value);checkPR(${exIdx},${si})"></td>
                  <td><button class="check-set ${s.done?'done':''}" id="chk-${exIdx}-${si}" onclick="toggleSet(${exIdx},${si})">${s.done?'✓':''}</button></td>
                </tr>`).join('')}
            </tbody>
          </table>
          <button class="btn ghost sm" onclick="addSet(${exIdx})" style="margin-top:4px">+ Set</button>
        </div>`;
    };

    if (isSuperset && superPartner) {
      html += `<div class="exercise-block superset">
        <div class="superset-label">⚡ Superset</div>
        ${exHTML(ex, idx)}
        ${exHTML(superPartner, superPartnerIdx)}
      </div>`;
    } else {
      html += `<div class="exercise-block">${exHTML(ex, idx)}</div>`;
    }
  });

  display.innerHTML = html;
}

function findLastPerformance(exName, history) {
  for (let i = history.length - 1; i >= 0; i--) {
    const found = history[i].exercises?.find(e => e.name === exName);
    if (found && found.sets?.some(s=>s.weight)) return { ...found, date: history[i].date };
  }
  return null;
}

function updateSet(exIdx, setIdx, field, val) {
  if (!todayWorkout) return;
  todayWorkout.exercises[exIdx].loggedSets[setIdx][field] = val;
}

function toggleSet(exIdx, setIdx) {
  if (!todayWorkout) return;
  const s = todayWorkout.exercises[exIdx].loggedSets[setIdx];
  s.done = !s.done;
  const btn = document.getElementById(`chk-${exIdx}-${setIdx}`);
  btn.classList.toggle('done', s.done);
  btn.textContent = s.done ? '✓' : '';
}

function addSet(exIdx) {
  if (!todayWorkout) return;
  todayWorkout.exercises[exIdx].loggedSets.push({ reps: '', weight: '', done: false });
  renderWorkoutDisplay();
}

function checkPR(exIdx, setIdx) {
  if (!todayWorkout) return;
  const ex = todayWorkout.exercises[exIdx];
  const set = ex.loggedSets[setIdx];
  const prs = getPRs(viewKey());
  const existingPR = prs[ex.name];
  const w = parseFloat(set.weight), r = parseFloat(set.reps);
  if (!w || !r) return;
  const wtEl = document.getElementById(`wt-${exIdx}-${setIdx}`);
  if (!existingPR || w > existingPR.weight || (w === existingPR.weight && r > existingPR.reps)) {
    wtEl?.classList.add('pr-input');
  } else {
    wtEl?.classList.remove('pr-input');
  }
}

function saveWorkout() {
  if (!todayWorkout) return;
  const prs = getPRs(viewKey());
  let newPRs = 0;

  const exercises = todayWorkout.exercises.map(ex => {
    const sets = ex.loggedSets.filter(s => s.reps || s.weight).map(s => ({
      reps: parseFloat(s.reps) || 0,
      weight: parseFloat(s.weight) || 0,
      done: s.done
    }));

    // Check PRs
    sets.forEach(s => {
      if (!s.weight) return;
      const existing = prs[ex.name];
      if (!existing || s.weight > existing.weight || (s.weight === existing.weight && s.reps > existing.reps)) {
        prs[ex.name] = { weight: s.weight, reps: s.reps, date: todayStr() };
        newPRs++;
      }
    });

    return { name: ex.name, muscle: ex.muscle, sets };
  }).filter(e => e.sets.length > 0);

  if (!exercises.length) { toast('Log at least one set before saving', true); return; }

  const history = getHistory(viewKey());
  history.push({
    date: todayStr(),
    muscleGroup: todayWorkout.muscleGroup,
    style: todayWorkout.style,
    title: todayWorkout.title,
    exercises
  });
  saveLocal(historyKey(viewKey()), history);
  saveLocal(prKey(viewKey()), prs);

  toast(newPRs > 0 ? `Workout saved! 🏆 ${newPRs} new PR${newPRs>1?'s':''}!` : 'Workout saved ✓');
  todayWorkout = null;
  renderToday();
}

// ═══════════════════════════════════════════
//  SWAP EXERCISE
// ═══════════════════════════════════════════
function openSwapModal(exIdx) {
  swapTargetIndex = exIdx;
  swapFilterMuscle = 'All';
  renderSwapLibrary('', 'All');
  openModal('swap-modal');
}

function filterSwapLibrary(q) { renderSwapLibrary(q, swapFilterMuscle); }

function renderSwapLibrary(q='', muscle='All') {
  const lib = getLibrary();
  const filtered = lib.filter(e =>
    (muscle==='All' || e.muscle===muscle) &&
    (!q || e.name.toLowerCase().includes(q.toLowerCase()))
  );
  const muscles = ['All', ...new Set(lib.map(e=>e.muscle))];
  document.getElementById('swap-filters').innerHTML = muscles.map(m=>
    `<span class="lib-filter ${m===muscle?'active':''}" onclick="swapFilterMuscle='${m}';filterSwapLibrary(document.getElementById('swap-search').value)">${m}</span>`
  ).join('');
  document.getElementById('swap-list').innerHTML = filtered.map(e=>
    `<div class="lib-item" onclick="doSwap('${e.id||e.name}')">
      <div><div class="lib-item-name">${e.name}</div><div class="lib-item-meta">${e.muscle} · ${e.equip}</div></div>
      <div class="lib-item-add">→</div>
    </div>`
  ).join('') || '<div class="empty"><p>No exercises found</p></div>';
}

function doSwap(exId) {
  if (swapTargetIndex === null || !todayWorkout) return;
  const lib = getLibrary();
  const ex = lib.find(e=>(e.id||e.name)===exId);
  if (!ex) return;
  const old = todayWorkout.exercises[swapTargetIndex];
  todayWorkout.exercises[swapTargetIndex] = {
    ...old,
    name: ex.name,
    muscle: ex.muscle,
    notes: ex.notes || '',
    weight_suggestion: '',
  };
  closeModal('swap-modal');
  renderWorkoutDisplay();
  toast(`Swapped to ${ex.name}`);
}

// ═══════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════
function renderHistory() {
  const history = getHistory(viewKey());
  const el = document.getElementById('history-list');
  if (!history.length) { el.innerHTML='<div class="empty"><div class="icon">📋</div><p>No workouts logged yet</p></div>'; return; }
  el.innerHTML = [...history].reverse().map((h,i)=>{
    const totalSets = h.exercises.reduce((acc,e)=>acc+e.sets.length,0);
    return `<div class="history-item" onclick="toggleHistoryDetail(${i})">
      <div class="history-item-header">
        <div><div class="history-date">${fmtDate(h.date)} — ${h.muscleGroup}</div><div class="history-muscle">${h.title||''}</div></div>
        <div class="history-stats">${h.exercises.length} ex · ${totalSets} sets</div>
      </div>
      <div class="history-detail" id="hist-detail-${i}">
        ${h.exercises.map(e=>`
          <div class="history-ex">
            <strong>${e.name}</strong>
            <span>${e.sets.map(s=>`${s.reps}×${s.weight}lbs`).join(', ')}</span>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleHistoryDetail(i) {
  const el = document.getElementById('hist-detail-'+i);
  el.classList.toggle('open');
}

// ═══════════════════════════════════════════
//  PRs
// ═══════════════════════════════════════════
function renderPRs() {
  const prs = getPRs(viewKey());
  const el = document.getElementById('pr-grid');
  const entries = Object.entries(prs);
  if (!entries.length) { el.innerHTML='<div class="empty" style="grid-column:1/-1"><div class="icon">🏆</div><p>No PRs yet — start logging workouts!</p></div>'; return; }
  el.innerHTML = entries.sort((a,b)=>a[0].localeCompare(b[0])).map(([name,pr])=>`
    <div class="pr-box">
      <div class="pr-ex">${name}</div>
      <div class="pr-val">${pr.weight} lbs</div>
      <div class="pr-meta">${pr.reps} reps · ${fmtDate(pr.date)}</div>
    </div>`).join('');
}

// ═══════════════════════════════════════════
//  LIBRARY
// ═══════════════════════════════════════════
function filterLibrary(q) { renderLibraryList(q, libFilterMuscle); }

function renderLibrary() {
  const muscles = ['All', ...MUSCLE_GROUPS];
  document.getElementById('lib-filters').innerHTML = muscles.map(m=>
    `<span class="lib-filter ${m===libFilterMuscle?'active':''}" onclick="libFilterMuscle='${m}';renderLibraryList(document.getElementById('lib-search').value,'${m}')">${m}</span>`
  ).join('');
  renderLibraryList('', libFilterMuscle);
}

function renderLibraryList(q='', muscle='All') {
  const lib = getLibrary();
  const filtered = lib.filter(e=>
    (muscle==='All'||e.muscle===muscle) &&
    (!q||e.name.toLowerCase().includes(q.toLowerCase()))
  );
  document.getElementById('lib-list').innerHTML = filtered.map(e=>`
    <div class="lib-item" style="cursor:default">
      <div>
        <div class="lib-item-name">${e.name}</div>
        <div class="lib-item-meta">${e.muscle} · ${e.equip}${e.notes?` · ${e.notes}`:''}</div>
      </div>
    </div>`).join('') || '<div class="empty"><p>No exercises found</p></div>';
}

function openAddExerciseModal() { openModal('add-ex-modal'); }

function saveNewExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  if (!name) { toast('Enter exercise name', true); return; }
  const custom = loadLocal(libraryKey(), []);
  custom.push({
    id: 'custom-' + Date.now(),
    name,
    muscle: document.getElementById('new-ex-muscle').value,
    equip: document.getElementById('new-ex-equip').value,
    notes: document.getElementById('new-ex-notes').value.trim()
  });
  saveLocal(libraryKey(), custom);
  closeModal('add-ex-modal');
  document.getElementById('new-ex-name').value='';
  document.getElementById('new-ex-notes').value='';
  renderLibrary();
  toast(`${name} added to library ✓`);
}

// ═══════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════
const DAYS_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MUSCLE_OPTIONS = ['Rest','Upper Body','Lower Body','Full Body','Push (Chest/Shoulders/Triceps)','Pull (Back/Biceps)','Chest & Triceps','Back & Biceps','Shoulders','Legs','Posterior Chain','Anterior Chain','Cardio','Pole Dancing','Cardio / Pole'];
const STYLE_OPTIONS = ['','Strength','Hypertrophy','HIIT / Supersets','Cardio'];

function renderSettings() {
  const sched = getSchedule(viewKey());
  const profile = getProfile(viewKey());

  // Schedule editor
  document.getElementById('schedule-editor').innerHTML = DAYS_ORDER.map(day => {
    const d = sched[day] || { gym: false, muscle: 'Rest', style: '' };
    return `<div class="set-row">
      <div>
        <label>${day}</label>
        <small>${d.gym ? '🏋️ Gym day' : '💤 Off'}</small>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="sched-muscle-${day}" onchange="schedGymCheck('${day}')">
          ${MUSCLE_OPTIONS.map(m=>`<option ${d.muscle===m?'selected':''}>${m}</option>`).join('')}
        </select>
        <select id="sched-style-${day}">
          ${STYLE_OPTIONS.map(s=>`<option ${d.style===s?'selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>`;
  }).join('');

  // Profile editor
  document.getElementById('training-profile-editor').innerHTML = `
    <div class="set-row">
      <div><label>Training Style</label><small>How the AI programs your workouts</small></div>
      <select id="prof-style">
        ${['Strength','Hypertrophy','HIIT / Supersets','Strength / Hypertrophy'].map(s=>`<option ${profile.style===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div class="set-row">
      <div><label>Experience Level</label></div>
      <select id="prof-exp">
        ${['Beginner','Beginner-Intermediate','Intermediate','Advanced'].map(s=>`<option ${profile.experience===s?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
    <div style="margin-top:14px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px">Goal (tells the AI what to optimize for)</div>
      <textarea id="prof-goal" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 12px;border-radius:8px;outline:none;resize:vertical;min-height:80px">${profile.goal}</textarea>
    </div>`;
}

function schedGymCheck(day) {
  const muscle = document.getElementById(`sched-muscle-${day}`).value;
  // auto-mark as gym or rest
}

function saveSchedule() {
  const sched = {};
  DAYS_ORDER.forEach(day => {
    const muscle = document.getElementById(`sched-muscle-${day}`)?.value || 'Rest';
    const style = document.getElementById(`sched-style-${day}`)?.value || '';
    const gym = !['Rest','Pole Dancing','Cardio / Pole'].includes(muscle);
    sched[day] = { gym, muscle, style };
  });
  saveLocal(scheduleKey(viewKey()), sched);
  toast('Schedule saved ✓');
  todayWorkout = null;
}

function saveProfile() {
  const profile = {
    style: document.getElementById('prof-style')?.value || 'Strength',
    experience: document.getElementById('prof-exp')?.value || 'Intermediate',
    goal: document.getElementById('prof-goal')?.value || ''
  };
  saveLocal(profileKey(viewKey()), profile);
  toast('Training profile saved ✓');
}

//  ENTER KEY
// ═══════════════════════════════════════════
document.getElementById('lp').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
